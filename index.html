<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayX Gaming Hub</title>

  <script>
    const params = new URLSearchParams(window.location.search);
    const gatePassword = params.get("password");

    if (gatePassword !== "iwantgames") {
      window.location.replace("ban.html");
    }
  </script>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:monospace;
      background:#020402;
      color:#39ff14;
      overflow:hidden;
    }

    canvas{
      position:fixed;
      inset:0;
      z-index:0;
    }

    .center{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      z-index:2;
      width:min(92vw, 380px);
    }

    .card{
      background:#0a120a;
      border:1px solid #39ff14;
      box-shadow:0 0 25px rgba(57,255,20,.45);
      padding:36px;
      text-align:center;
    }

    h1{
      margin:0 0 18px 0;
      font-size:30px;
      letter-spacing:.5px;
      text-shadow:0 0 10px rgba(57,255,20,.4);
    }

    #terminal{
      min-height:24px;
      margin-bottom:18px;
      color:#9dff8b;
    }

    input{
      width:100%;
      padding:12px 14px;
      margin:10px 0;
      background:#000;
      border:1px solid #39ff14;
      color:#39ff14;
      outline:none;
      font-family:monospace;
      font-size:15px;
    }

    input:focus{
      box-shadow:0 0 0 3px rgba(57,255,20,.12);
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      background:#39ff14;
      border:none;
      color:#000;
      font-weight:bold;
      font-family:monospace;
      font-size:15px;
      cursor:pointer;
    }

    button:hover{
      filter:brightness(1.05);
    }

    #loading{
      display:none;
      margin-top:14px;
      color:#caffc0;
    }

    #status{
      margin-top:12px;
      min-height:24px;
      font-weight:bold;
    }

    #granted{
      display:none;
      margin-top:16px;
      text-align:left;
      background:#000;
      border:1px solid #39ff14;
      padding:12px;
      color:#baffad;
    }

    .line{
      opacity:0;
      animation:fadeLine .35s forwards;
    }

    @keyframes fadeLine{
      to{ opacity:1; }
    }

    .hint{
      margin-top:14px;
      color:#7ecf75;
      font-size:12px;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="center">
    <div class="card">
      <h1>PlayX Gaming Hub</h1>
      <div id="terminal"></div>

      <input id="code" type="password" placeholder="Enter elite password" />
      <button onclick="auth()">ENTER</button>

      <div id="loading">Authenticating...</div>
      <div id="status"></div>
      <div id="granted"></div>

      <div class="hint">VIP node access portal</div>
    </div>
  </div>

  <script>
    const terminalText = "Initializing secure node...";
    let terminalIndex = 0;

    function typeTerminal() {
      if (terminalIndex < terminalText.length) {
        document.getElementById("terminal").textContent += terminalText.charAt(terminalIndex);
        terminalIndex++;
        setTimeout(typeTerminal, 40);
      }
    }
    typeTerminal();

    async function sha256(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function showGrantedSequence() {
      const granted = document.getElementById("granted");
      const lines = [
        "[ OK ] Password hash verified",
        "[ OK ] Successful login",
        "[ OK ] Loading PlayX modules",
        "[ OK ] Syncing elite session",
        "[ OK ] Welcome to PlayX Gaming Hub"
      ];

      granted.innerHTML = "";
      granted.style.display = "block";

      lines.forEach((text, idx) => {
        const div = document.createElement("div");
        div.className = "line";
        div.style.animationDelay = (idx * 250) + "ms";
        div.textContent = text;
        granted.appendChild(div);
      });
    }

    async function auth() {
      const correctHash = "5a8d04f304455598d3fe1d1848664d7eb5f9455928ce581ce9b1af2e84012f53";
      const input = document.getElementById("code").value;
      const loading = document.getElementById("loading");
      const status = document.getElementById("status");
      const granted = document.getElementById("granted");

      status.textContent = "";
      granted.style.display = "none";
      loading.style.display = "block";

      try {
        const inputHash = await sha256(input);

        setTimeout(() => {
          loading.style.display = "none";

          if (inputHash === correctHash) {
            status.textContent = "Successful login";
            showGrantedSequence();
          } else {
            status.textContent = "Access denied";
          }
        }, 900);
      } catch (err) {
        loading.style.display = "none";
        status.textContent = "Hash check failed";
      }
    }

    const c = document.getElementById("matrix");
    const ctx = c.getContext("2d");

    function resizeCanvas() {
      c.width = window.innerWidth;
      c.height = window.innerHeight;
      resetDrops();
    }

    const letters = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 16;
    let columns = 0;
    let drops = [];

    function resetDrops() {
      columns = Math.floor(c.width / fontSize);
      drops = Array(columns).fill(1);
    }

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, c.width, c.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > c.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    setInterval(drawMatrix, 35);
  </script>
</body>
</html>
