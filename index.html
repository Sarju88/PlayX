<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - Classroom</title>
  <script>
    const BASE_PATH = "/PlayX/";
    const params = new URLSearchParams(window.location.search);
    const gatePassword = params.get("password");

    if (gatePassword !== "iwantgames") {
      window.location.replace(BASE_PATH + "ban.html");
    }

    if (sessionStorage.getItem("playx_auth") === "true") {
      window.location.replace(BASE_PATH + "dashboard.html");
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: monospace;
      background: #020402;
      color: #39ff14;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .brand-corner {
      position: fixed;
      top: 18px;
      left: 20px;
      z-index: 3;
      color: #39ff14;
      font-family: monospace;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.45);
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      width: min(92vw, 390px);
    }

    .card {
      background: rgba(10, 18, 10, 0.95);
      border: 1px solid #39ff14;
      box-shadow: 0 0 25px rgba(57, 255, 20, 0.45);
      padding: 36px;
      text-align: center;
    }

    h1 {
      margin: 0 0 18px 0;
      font-size: 30px;
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.4);
    }

    #terminal {
      min-height: 24px;
      margin-bottom: 18px;
      color: #9dff8b;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin: 10px 0;
      background: #000;
      border: 1px solid #39ff14;
      color: #39ff14;
      outline: none;
      font-family: monospace;
      font-size: 15px;
    }

    input:focus {
      box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.12);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #39ff14;
      border: none;
      color: #000;
      font-weight: bold;
      font-family: monospace;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.05);
    }

    #loading {
      display: none;
      margin-top: 14px;
      color: #caffc0;
    }

    #status {
      margin-top: 12px;
      min-height: 24px;
      font-weight: bold;
    }

    .hint {
      margin-top: 14px;
      color: #7ecf75;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="brand-corner">PlayX Learning Hub</div>

  <div class="center">
    <div class="card">
      <h1>Elite Access</h1>
      <div id="terminal"></div>

      <input id="code" type="password" placeholder="Enter elite password" />
      <button id="enterBtn">ENTER</button>

      <div id="loading">Authenticating...</div>
      <div id="status"></div>

      <div class="hint">VIP node access portal</div>
    </div>
  </div>

  <script>
    const BASE_PATH_2 = "/PlayX/";
    const terminalText = "Initializing secure node...";
    let terminalIndex = 0;

    function typeTerminal() {
      if (terminalIndex < terminalText.length) {
        document.getElementById("terminal").textContent += terminalText.charAt(terminalIndex);
        terminalIndex++;
        setTimeout(typeTerminal, 40);
      }
    }
    typeTerminal();

    async function sha256(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function auth() {
      const correctHash = "ea7b5cbf3b6135901b045900e1635af116da0edc89711e01a46f14a8783cb4bd";
      const input = document.getElementById("code").value
        .replace(/\u200B/g, "")
        .trim();

      const loading = document.getElementById("loading");
      const status = document.getElementById("status");

      status.textContent = "";
      loading.style.display = "block";

      try {
        const inputHash = await sha256(input);
        loading.style.display = "none";

        if (inputHash === correctHash) {
          sessionStorage.setItem("playx_auth", "true");
          window.location.replace(BASE_PATH_2 + "dashboard.html");
        } else {
          status.textContent = "Access denied";
        }
      } catch (err) {
        loading.style.display = "none";
        status.textContent = "Hash check failed";
        console.error(err);
      }
    }

    document.getElementById("enterBtn").addEventListener("click", auth);
    document.getElementById("code").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        auth();
      }
    });

    const c = document.getElementById("matrix");
    const ctx = c.getContext("2d");
    const letters = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 16;
    let drops = [];

    function resizeCanvas() {
      c.width = window.innerWidth;
      c.height = window.innerHeight;
      const columns = Math.floor(c.width / fontSize);
      drops = Array(columns).fill(1);
    }

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, c.width, c.height);

      ctx.fillStyle = "#39ff14";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > c.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    setInterval(drawMatrix, 35);
  </script>
</body>
</html>
